<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electro'Com</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="pages-wrapper">
<!-- ========== PAGE 1: LOGIN ========== -->

    <section id="login-page" class="page">
        <div class="form-container">
            <h1>Login</h1>
            <div class="form-group">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" class="input-field" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" class="input-field" placeholder="Enter password">
            </div>
            <button id="login-btn" class="btn-primary">Login</button>
            <div id="login-loading" class="loading hidden">Loading...</div>
            <div id="login-error" class="error-message hidden"></div>
            <p>Don't have an account? <a href="#" id="goto-signup">Sign Up</a></p>
        </div>
    </section>

<!-- ========== PAGE 5: SIGN UP ========== -->
    <section id="signup-page" class="page hidden">
        <div class="form-container">
            <h1>Sign Up</h1>
            <div class="form-group">
                <label for="signup-username">Username</label>
                <input type="text" id="signup-username" class="input-field" placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label for="signup-email">Email</label>
                <input type="email" id="signup-email" class="input-field" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" class="input-field" placeholder="Choose a password">
            </div>
            <div class="form-group">
                <label for="signup-confirm-password">Confirm Password</label>
                <input type="password" id="signup-confirm-password" class="input-field" placeholder="Confirm password">
            </div>
            <button id="signup-btn" class="btn-primary">Sign Up</button>
            <div id="signup-loading" class="loading hidden">Creating account...</div>
            <div id="signup-error" class="error-message hidden"></div>
            <div id="signup-success" class="success-message hidden">Account created! Redirecting to login...</div>
            <p>Already have an account? <a href="#" id="goto-login">Login</a></p>
        </div>
    </section>

<!-- ========== PAGE 2: HOME ========== -->
    <section id="home-page" class="page hidden">
        <div class="header">
            <button id="logout-btn-home" class="btn-logout">Logout</button>
        </div>
        <div class="center-content">
            <h1 id="welcome-message">Hello, what can I assist you with?</h1>
            <div class="button-group">
                <button id="goto-meeting-btn" class="btn-primary btn-home">Minut</button>
                <button id="goto-email-btn" class="btn-primary btn-home">Send Email</button>
            </div>
        </div>
    </section>

<!-- ========== PAGE 3: MEETING FORM ========== -->
    <section id="meeting-page" class="page hidden">
        <div class="header">
            <button id="back-to-home-meeting" class="btn-secondary">← Back</button>
            <button id="logout-btn-meeting" class="btn-logout">Logout</button>
        </div>
        <div class="form-container">
            <h1>Schedule Meeting</h1>
            <div class="form-group">
                <label for="meeting-people">People Present</label>
                <input type="text" id="meeting-people" class="input-field" placeholder="John Doe, Jane Smith">
            </div>
            <div class="form-group">
                <label for="meeting-location">Location</label>
                <input type="text" id="meeting-location" class="input-field" placeholder="Conference Room A">
            </div>
            <div class="form-group">
                <label for="meeting-time-begin">Start Time</label>
                <input type="time" id="meeting-time-begin" class="input-field">
            </div>
            <div class="form-group">
                <label for="meeting-time-end">End Time</label>
                <input type="time" id="meeting-time-end" class="input-field">
            </div>
            <div class="form-group">
                <label for="meeting-date">Date</label>
                <input type="date" id="meeting-date" class="input-field">
            </div>
            <div class="form-group">
                <label for="meeting-subject">Subject</label>
                <input type="text" id="meeting-subject" class="input-field" placeholder="Meeting topic">
            </div>
            <div class="form-group">
                <label for="meeting-details">Details</label>
                <textarea id="meeting-details" class="input-field" rows="4" placeholder="Additional information..."></textarea>
            </div>
            <button id="meeting-submit-btn" class="btn-primary">Submit</button>
            <div id="meeting-loading" class="loading hidden">Validating...</div>
            <div id="meeting-result" class="hidden"></div>
        </div>
    </section>

<!-- ========== PAGE 4: EMAIL FORM ========== -->
    <section id="email-page" class="page hidden">
        <div class="header">
            <button id="back-to-home-email" class="btn-secondary">← Back</button>
            <button id="logout-btn-email" class="btn-logout">Logout</button>
        </div>
        <div class="form-container">
            <h1>Send Email</h1>
            <div class="form-group">
                <label for="email-recipients">Recipient Email(s)</label>
                <input type="text" id="email-recipients" class="input-field" placeholder="email@example.com, another@example.com">
            </div>
            <div class="form-group">
                <label for="email-content">Message</label>
                <textarea id="email-content" class="input-field" rows="6" placeholder="Type your message here..."></textarea>
            </div>
            <button id="email-submit-btn" class="btn-primary">Send</button>
            <div id="email-loading" class="loading hidden">Sending...</div>
            <div id="email-success" class="success-message hidden">Email sent successfully!</div>
            <div id="email-error" class="error-message hidden"></div>
        </div>
    </section>
</div>
<script src="script.js"></script>
</body>
</html>
