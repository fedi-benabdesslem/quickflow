# Trivy Configuration File for QuickFlow
# Compatible with Trivy v0.68+

# Scan settings
scan:
  # Skip specific file patterns
  skip-files:
    - "**/*.md"
    - "**/*.txt"
    - "**/*.log"
    - "**/test/**"
    - "**/tests/**"
    - "**/__tests__/**"
    - "**/node_modules/**"
    - "**/target/**"
    - "**/dist/**"
    - "**/build/**"

  # Skip entire directories
  skip-dirs:
    - node_modules
    - target
    - dist
    - build
    - .git
    - .github
    - .vscode
    - .idea
    - coverage
    - security-reports
    - tmp
    - temp

# Package (vulnerability) settings - UPDATED from 'vulnerability'
pkg:
  # Vulnerability types to detect (UPDATED KEY)
  types:
    - os
    - library

# Vulnerability settings
vulnerability:
  # Severity levels to report
  severity:
    - UNKNOWN
    - LOW
    - MEDIUM
    - HIGH
    - CRITICAL

  # Ignore unfixed vulnerabilities
  ignore-unfixed: false

# Database settings
db:
  skip-update: false
  no-progress: false
  java-db: true

# Cache settings
cache:
  dir: .trivycache/

# Output format
format: table

# Timeout
timeout: 5m0s

# Secret scanning
secret:
  config: trivy-secret.yaml

# Exit code
exit-code: 0

# Parallel scanning
parallel: 5

# Offline mode
offline: false

# Quiet mode
quiet: false

# Debug mode
debug: false

# Severity filter
severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL

# Ignore policy
ignore-policy: .trivyignore

# Scanners
scanners:
  - vuln
  - secret
  - config
  - license