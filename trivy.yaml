# Trivy Configuration File for QuickFlow
# This file customizes Trivy's behavior for the project

# Scan settings
scan:
  # Skip specific file patterns
  skip-files:
    - "**/*.md"
    - "**/*.txt"
    - "**/*.log"
    - "**/test/**"
    - "**/tests/**"
    - "**/__tests__/**"
    - "**/node_modules/**"
    - "**/target/**"
    - "**/dist/**"
    - "**/build/**"
    - "**/.git/**"
    - "**/coverage/**"
    - "**/*.test.js"
    - "**/*.test.ts"
    - "**/*.spec.js"
    - "**/*.spec.ts"
  
  # Skip entire directories
  skip-dirs:
    - node_modules
    - target
    - dist
    - build
    - .git
    - .github
    - .vscode
    - .idea
    - coverage
    - security-reports
    - tmp
    - temp

# Vulnerability detection settings
vulnerability:
  # Severity levels to report
  severity:
    - UNKNOWN
    - LOW
    - MEDIUM
    - HIGH
    - CRITICAL
  
  # Vulnerability types to detect
  type:
    - os
    - library
  
  # Ignore unfixed vulnerabilities (no patch available)
  ignore-unfixed: false

# Database settings
db:
  # Skip database update (useful for CI with caching)
  skip-update: false
  
  # Download DB only
  download-only: false
  
  # No progress bar (cleaner CI logs)
  no-progress: false
  
  # Use Java DB for better Java scanning
  java-db: true

# Cache settings
cache:
  # Cache directory
  dir: .trivycache/
  
  # Clear cache before scanning
  clear: false

# Output format
format: table

# Report settings
report:
  # Format for reports
  format: all

# Timeout settings
timeout: 5m0s

# Secret scanning settings (loaded from separate file)
secret:
  config: trivy-secret.yaml

# Exit codes
exit-code: 0  # Don't fail by default, let specific scans decide

# Parallel scanning
parallel: 5

# Offline mode (useful when DB is pre-downloaded)
offline: false

# Quiet mode (reduce output)
quiet: false

# Debug mode
debug: false

# Severity filter for output
severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL

# Ignore policy file
ignore-policy: .trivyignore

# Scanners to use
scanners:
  - vuln
  - secret
  - config
  - license
