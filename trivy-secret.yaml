# Trivy Secret Scanning Configuration for QuickFlow
# Custom rules and patterns for detecting sensitive data

# Disable built-in rules that cause false positives
disabled-rules:
  - generic-api-key  # Too many false positives on example values
  - jwt  # Will use custom JWT rules below

# Custom secret detection patterns
custom-patterns:
  # Supabase specific patterns
  - id: supabase-anon-key
    category: supabase
    title: Supabase Anonymous Key
    description: Detects Supabase anon keys
    pattern: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\\.[a-zA-Z0-9_-]+\\.[a-zA-Z0-9_-]+"
    severity: HIGH
    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByb2plY3QiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTY0MTIzNDU2N30.ABC123"
  
  - id: supabase-service-key
    category: supabase
    title: Supabase Service Role Key
    description: Detects Supabase service role keys (highly sensitive)
    pattern: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\\.[a-zA-Z0-9_-]+\\.[a-zA-Z0-9_-]+"
    severity: CRITICAL
    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByb2plY3QiLCJyb2xlIjoic2VydmljZV9yb2xlIiwiaWF0IjoxNjQxMjM0NTY3fQ.XYZ789"

  # Google OAuth patterns
  - id: google-oauth-client-id
    category: google
    title: Google OAuth Client ID
    description: Detects Google OAuth 2.0 client IDs
    pattern: "[0-9]+-[a-zA-Z0-9_]+\\.apps\\.googleusercontent\\.com"
    severity: MEDIUM
    example: "123456789012-abcdefghijklmnopqrstuvwxyz012345.apps.googleusercontent.com"
  
  - id: google-oauth-client-secret
    category: google
    title: Google OAuth Client Secret
    description: Detects Google OAuth 2.0 client secrets
    pattern: "GOCSPX-[a-zA-Z0-9_-]{28}"
    severity: CRITICAL
    example: "GOCSPX-abcdefghijklmnopqrstuvwxyz"
  
  - id: google-api-key
    category: google
    title: Google API Key
    description: Detects Google API keys
    pattern: "AIza[0-9A-Za-z\\-_]{35}"
    severity: HIGH
    example: "AIzaSyDaGmWKa4JsXZ-HjGw7ISLn_3namBGewQe"

  # Microsoft Azure patterns
  - id: azure-client-secret
    category: azure
    title: Azure Client Secret
    description: Detects Azure AD application client secrets
    pattern: "[a-zA-Z0-9~._-]{34,40}"
    severity: CRITICAL
    example: "8Q~abcdefghijklmnopqrstuvwxyz012345"
  
  - id: microsoft-graph-token
    category: azure
    title: Microsoft Graph Access Token
    description: Detects Microsoft Graph API access tokens
    pattern: "EwA[a-zA-Z0-9+/=]{500,}"
    severity: CRITICAL
    example: "EwAoA8l6BAAUO9chh8c..."

  # Database connection strings
  - id: mongodb-connection-string
    category: database
    title: MongoDB Connection String
    description: Detects MongoDB connection strings with credentials
    pattern: "mongodb(\\+srv)?://[^:]+:[^@]+@[^/]+"
    severity: CRITICAL
    example: "mongodb+srv://username:password@cluster.mongodb.net/database"
  
  - id: mongodb-atlas-key
    category: database
    title: MongoDB Atlas API Key
    description: Detects MongoDB Atlas API keys
    pattern: "[a-z0-9]{8}-[a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{12}"
    severity: HIGH
    example: "abcd1234-ef56-gh78-ij90-klmn12345678"

  # JWT tokens
  - id: jwt-token-full
    category: jwt
    title: JWT Token
    description: Detects full JWT tokens
    pattern: "ey[A-Za-z0-9_-]+\\.ey[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+"
    severity: HIGH
    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"

  # Email service credentials
  - id: gmail-oauth-refresh-token
    category: google
    title: Gmail OAuth Refresh Token
    description: Detects Gmail OAuth refresh tokens
    pattern: "1//[a-zA-Z0-9_-]{40,}"
    severity: CRITICAL
    example: "1//0abcdefghijklmnopqrstuvwxyz1234567890ABCDEFG"

  # Generic sensitive patterns
  - id: private-key
    category: crypto
    title: Private Key
    description: Detects private key files
    pattern: "-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----"
    severity: CRITICAL
    example: "-----BEGIN PRIVATE KEY-----"
  
  - id: aws-access-key
    category: aws
    title: AWS Access Key ID
    description: Detects AWS access key IDs
    pattern: "AKIA[0-9A-Z]{16}"
    severity: CRITICAL
    example: "AKIAIOSFODNN7EXAMPLE"

# Allowlist - patterns that should be ignored
allowlist:
  # Example/placeholder values
  - rule: generic-api-key
    patterns:
      - "EXAMPLE_API_KEY"
      - "your_api_key_here"
      - "YOUR_.*_KEY"
      - "test-api-key"
      - "fake-key-123"
      - "sk-test-.*"
      - "pk-test-.*"
      - "<YOUR_.*>"
      - "\\$\\{.*\\}"  # Environment variable placeholders
  
  # Documentation and README files
  - rule: supabase-anon-key
    paths:
      - "**/README.md"
      - "**/SETUP.md"
      - "**/docs/**"
      - "**/*.example"
      - "**/*.sample"
  
  - rule: google-oauth-client-id
    paths:
      - "**/README.md"
      - "**/SETUP.md"
      - "**/docs/**"
      - "**/*.example"
  
  # Test files with mock secrets
  - rule: jwt-token-full
    paths:
      - "**/test/**"
      - "**/tests/**"
      - "**/__tests__/**"
      - "**/*.test.ts"
      - "**/*.test.js"
      - "**/*.spec.ts"
      - "**/*.spec.js"
  
  # Configuration templates
  - rule: mongodb-connection-string
    paths:
      - "**/*.example"
      - "**/*.sample"
      - "**/*.template"
      - "**/README.md"
      - "**/SETUP.md"

# Global exclusions
global-allowlist:
  # File patterns to always ignore
  patterns:
    - "test.*"
    - "mock.*"
    - "example.*"
    - "sample.*"
    - "template.*"
    - "TODO.*"
    - "CHANGELOG.*"
  
  # Paths to always ignore
  paths:
    - "**/node_modules/**"
    - "**/target/**"
    - "**/dist/**"
    - "**/build/**"
    - "**/.git/**"
    - "**/coverage/**"
    - "**/security-reports/**"

# Severity levels for different secret types
severity-override:
  - rule-id: supabase-service-key
    severity: CRITICAL
  
  - rule-id: google-oauth-client-secret
    severity: CRITICAL
  
  - rule-id: mongodb-connection-string
    severity: CRITICAL
  
  - rule-id: private-key
    severity: CRITICAL
  
  - rule-id: google-oauth-client-id
    severity: MEDIUM
  
  - rule-id: jwt-token-full
    severity: HIGH
