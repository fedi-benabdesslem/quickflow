<div class="page-container meeting-page">
    <div class="header">
        <button class="btn-secondary" (click)="goBack()">
            <span class="btn-icon">←</span>
            Back
        </button>
        <button class="btn-logout" (click)="logout()">
            <span class="btn-icon">🚪</span>
            Logout
        </button>
    </div>

    <div class="form-card">
        <div class="card-header">
            <div class="page-icon">📝</div>
            <h1>Create Meeting Summary</h1>
            <p class="subtitle">Fill in the meeting details to generate a professional summary</p>
        </div>

        <form (ngSubmit)="handleSubmit()" class="form">
            <div class="form-row">
                <div class="form-group">
                    <label for="meeting-people">
                        <span class="label-icon">👥</span>
                        Attendees
                    </label>
                    <input type="text" id="meeting-people" [(ngModel)]="formData.people" name="people"
                        placeholder="John, Jane, Team Lead" class="input-field" [disabled]="loading()" />
                </div>

                <div class="form-group">
                    <label for="meeting-location">
                        <span class="label-icon">📍</span>
                        Location
                    </label>
                    <input type="text" id="meeting-location" [(ngModel)]="formData.location" name="location"
                        placeholder="Conference Room A" class="input-field" [disabled]="loading()" />
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="meeting-time-begin">
                        <span class="label-icon">🕐</span>
                        Start Time
                    </label>
                    <input type="time" id="meeting-time-begin" [(ngModel)]="formData.timeBegin" name="timeBegin"
                        class="input-field" [disabled]="loading()" />
                </div>

                <div class="form-group">
                    <label for="meeting-time-end">
                        <span class="label-icon">🕐</span>
                        End Time
                    </label>
                    <input type="time" id="meeting-time-end" [(ngModel)]="formData.timeEnd" name="timeEnd"
                        class="input-field" [disabled]="loading()" />
                </div>

                <div class="form-group">
                    <label for="meeting-date">
                        <span class="label-icon">📅</span>
                        Date
                    </label>
                    <input type="date" id="meeting-date" [(ngModel)]="formData.date" name="date" class="input-field"
                        [disabled]="loading()" />
                </div>
            </div>

            <div class="form-group">
                <label for="meeting-subject">
                    <span class="label-icon">📌</span>
                    Subject
                </label>
                <input type="text" id="meeting-subject" [(ngModel)]="formData.subject" name="subject"
                    placeholder="Meeting topic" class="input-field" [disabled]="loading()" />
            </div>

            <div class="form-group">
                <label for="meeting-details">
                    <span class="label-icon">📄</span>
                    Details
                </label>
                <textarea id="meeting-details" [(ngModel)]="formData.details" name="details" rows="4"
                    placeholder="Additional information..." class="input-field" [disabled]="loading()"></textarea>
            </div>

            <div *ngIf="error()" class="error-message">{{ error() }}</div>

            <button type="submit" class="btn-primary" [disabled]="loading()">
                <span *ngIf="loading()" class="button-loading">
                    <span class="spinner-small"></span>
                    Generating...
                </span>
                <span *ngIf="!loading()">
                    <span class="btn-icon">✨</span>
                    Generate Summary
                </span>
            </button>
        </form>
    </div>
</div>
