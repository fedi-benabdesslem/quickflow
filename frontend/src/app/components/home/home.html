<div class="page-container home-page">
    <div class="header">
        <button class="btn-profile" (click)="editProfile()">
            <span class="btn-icon">👤</span>
            Edit Profile
        </button>
        <button class="btn-logout" (click)="logout()">
            <span class="btn-icon">🚪</span>
            Logout
        </button>
    </div>

    <div class="center-content">
        <div class="welcome-card">
            <div class="welcome-icon">👋</div>
            <h1>Welcome back, <span class="username-highlight">{{ auth.user()?.username }}</span>!</h1>
            <p class="welcome-subtitle">Choose an action to get started with AI assistance</p>
        </div>

        <div class="action-cards">
            <div class="action-card meeting-card" (click)="navigateTo('/meeting')">
                <div class="card-icon">📝</div>
                <h3>Create Meeting Summary</h3>
                <p>Generate professional meeting summaries (PV) with AI</p>
                <div class="card-arrow">→</div>
            </div>

            <div class="action-card email-card" (click)="navigateTo('/email')">
                <div class="card-icon">✉️</div>
                <h3>Draft Email</h3>
                <p>Create polished emails with AI-powered assistance</p>
                <div class="card-arrow">→</div>
            </div>
        </div>
    </div>
</div>
