<div class="page-container review-page" *ngIf="reviewData">
    <div class="header">
        <button class="btn-secondary" (click)="goBack()">
            <span class="btn-icon">←</span>
            Back
        </button>
        <button class="btn-logout" (click)="logout()">
            <span class="btn-icon">🚪</span>
            Logout
        </button>
    </div>

    <div class="form-card review-card">
        <div class="card-header">
            <div class="page-icon">👁️</div>
            <h1>Review & Edit</h1>
            <p class="subtitle">
                {{ reviewData.type === 'email' ? 'Review Email Draft' : 'Review Meeting Summary (PV)' }}
            </p>
        </div>

        <div class="form">
            <div class="form-group">
                <label for="review-subject">
                    <span class="label-icon">📌</span>
                    Subject
                </label>
                <input type="text" id="review-subject" [(ngModel)]="subject" name="subject" placeholder="Subject"
                    class="input-field" [disabled]="loading()" />
            </div>

            <div *ngIf="reviewData.type === 'email'" class="review-section">
                <div class="form-group">
                    <label for="review-recipients">
                        <span class="label-icon">📧</span>
                        Recipients
                    </label>
                    <input type="text" id="review-recipients" [(ngModel)]="recipients" name="recipients"
                        placeholder="email@example.com" class="input-field" [disabled]="loading()" />
                </div>
            </div>

            <div *ngIf="reviewData.type !== 'email'" class="review-section">
                <div class="form-row">
                    <div class="form-group">
                        <label for="review-people">
                            <span class="label-icon">👥</span>
                            Attendees
                        </label>
                        <input type="text" id="review-people" [(ngModel)]="people" name="people"
                            placeholder="John, Jane" class="input-field" [disabled]="loading()" />
                    </div>
                    <div class="form-group">
                        <label for="review-location">
                            <span class="label-icon">📍</span>
                            Location
                        </label>
                        <input type="text" id="review-location" [(ngModel)]="location" name="location"
                            placeholder="Conference Room" class="input-field" [disabled]="loading()" />
                    </div>
                    <div class="form-group">
                        <label for="review-date">
                            <span class="label-icon">📅</span>
                            Date
                        </label>
                        <input type="date" id="review-date" [(ngModel)]="date" name="date" class="input-field"
                            [disabled]="loading()" />
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="review-content">
                    <span class="label-icon">📄</span>
                    Content
                </label>
                <textarea id="review-content" [(ngModel)]="content" name="content" rows="10"
                    placeholder="Generated content will appear here..." class="input-field"
                    [disabled]="loading()"></textarea>
            </div>

            <div *ngIf="error()" class="error-message">{{ error() }}</div>
            <div *ngIf="success()" class="success-message">{{ success() }}</div>

            <div class="button-group">
                <button type="button" class="btn-primary btn-send" (click)="handleSend()" [disabled]="loading()">
                    <span *ngIf="loading()" class="button-loading">
                        <span class="spinner-small"></span>
                        Sending...
                    </span>
                    <span *ngIf="!loading()">
                        <span class="btn-icon">📤</span>
                        Send Final
                    </span>
                </button>
                <button type="button" class="btn-secondary" (click)="handleEdit()" [disabled]="loading()">
                    <span class="btn-icon">✏️</span>
                    Edit Original
                </button>
            </div>
        </div>
    </div>
</div>
