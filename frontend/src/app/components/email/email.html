<div class="page-container email-page">
    <div class="header">
        <button class="btn-secondary" (click)="goBack()">
            <span class="btn-icon">←</span>
            Back
        </button>
        <button class="btn-logout" (click)="logout()">
            <span class="btn-icon">🚪</span>
            Logout
        </button>
    </div>

    <div class="form-card">
        <div class="card-header">
            <div class="page-icon">✉️</div>
            <h1>Draft Email</h1>
            <p class="subtitle">Compose your message and let AI polish it for you</p>
        </div>

        <form (ngSubmit)="handleSubmit()" class="form">
            <div class="form-group">
                <label for="email-recipients">
                    <span class="label-icon">📧</span>
                    Recipient Email(s)
                </label>
                <input type="text" id="email-recipients" [(ngModel)]="recipients" name="recipients"
                    placeholder="email@example.com, another@example.com" class="input-field" [disabled]="loading()" />
            </div>

            <div class="form-group">
                <label for="email-content">
                    <span class="label-icon">💬</span>
                    Message
                </label>
                <textarea id="email-content" [(ngModel)]="content" name="content" rows="6"
                    placeholder="Type your message here..." class="input-field" [disabled]="loading()"></textarea>
            </div>

            <div *ngIf="error()" class="error-message">{{ error() }}</div>
            <div *ngIf="success()" class="success-message">{{ success() }}</div>

            <button type="submit" class="btn-primary" [disabled]="loading()">
                <span *ngIf="loading()" class="button-loading">
                    <span class="spinner-small"></span>
                    Generating...
                </span>
                <span *ngIf="!loading()">
                    <span class="btn-icon">✨</span>
                    Generate & Review
                </span>
            </button>
        </form>
    </div>
</div>
