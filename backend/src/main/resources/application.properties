spring.application.name=Ai-application
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=mistral-nemo

# Server Configuration
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/electrodb
spring.data.mongodb.auto-index-creation=true

# Optional: Logging for Mongo queries
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# Supabase JWT Configuration
# ===========================
# Replace this with your Supabase JWT secret from:
# https://supabase.com/dashboard/project/_/settings/api (under JWT Settings)
supabase.jwt.secret=${SUPABASE_JWT_SECRET:23e314f6-014f-48d0-98e7-ef6a75bf1e6c}

# Email Configuration (SMTP - Gmail)
# Required environment variables:
# - MAIL_USERNAME: Your Gmail address
# - MAIL_PASSWORD: Your Gmail App Password (get from https://myaccount.google.com/apppasswords)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com