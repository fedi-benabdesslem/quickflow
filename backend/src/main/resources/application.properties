spring.application.name=Ai-application

# Gemini API Configuration (OpenAI-compatible)
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai/
spring.ai.openai.api-key=${GEMINI_API_KEY:}
spring.ai.openai.chat.options.model=gemini-2.5-flash
spring.ai.openai.chat.options.temperature=0.7

# Server Configuration
server.port=8080

# File Upload Configuration
spring.servlet.multipart.max-file-size=350MB
spring.servlet.multipart.max-request-size=350MB

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/electrodb}
spring.data.mongodb.auto-index-creation=true

# GridFS Configuration
spring.data.mongodb.grid-fs-database=electrodb

# Optional: Logging for Mongo queries
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# ============================
# JWT Configuration
# ============================
app.jwt.secret=${JWT_SECRET}

# Token Encryption Key (32 bytes for AES-256)
token.encryption.key=${TOKEN_ENCRYPTION_KEY}

# ============================
# App URLs
# ============================
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.backend.url=${BACKEND_URL:http://localhost:8080}

# ============================
# System Email (Resend)
# ============================
app.resend.api-key=${RESEND_API_KEY:}
app.email.from=${EMAIL_FROM:QuickFlow <noreply@quickflow.app>}

# ============================
# Google OAuth Configuration
# ============================
google.oauth.client-id=${GOOGLE_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET:}

# Spring Security OAuth2 Client Registration — Google
spring.security.oauth2.client.registration.google.client-id=${google.oauth.client-id}
spring.security.oauth2.client.registration.google.client-secret=${google.oauth.client-secret}
spring.security.oauth2.client.registration.google.scope=openid,email,profile,https://www.googleapis.com/auth/gmail.send,https://www.googleapis.com/auth/gmail.readonly,https://www.googleapis.com/auth/contacts.readonly
spring.security.oauth2.client.registration.google.redirect-uri=${app.backend.url}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth?access_type=offline&prompt=consent

# ============================
# Microsoft OAuth Configuration
# ============================
microsoft.oauth.client-id=${MICROSOFT_CLIENT_ID:}
microsoft.oauth.client-secret=${MICROSOFT_CLIENT_SECRET:}
microsoft.oauth.tenant-id=${MICROSOFT_TENANT_ID:common}

