spring.application.name=Ai-application
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=mistral-nemo

# Server Configuration
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/electrodb
spring.data.mongodb.auto-index-creation=true

# Optional: Logging for Mongo queries
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# OAuth2 / Keycloak Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/quickflow-realm

# Email Configuration (SMTP - Gmail)
# Required environment variables:
# - MAIL_USERNAME: Your Gmail address
# - MAIL_PASSWORD: Your Gmail App Password (get from https://myaccount.google.com/apppasswords)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com