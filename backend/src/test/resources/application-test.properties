# Test configuration - disables external dependencies
spring.application.name=Ai-application-test

# Disable MongoDB for unit tests (individual tests can override)
spring.data.mongodb.uri=mongodb://localhost:27017/test-db
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration

# Disable AI/OpenAI for tests
spring.ai.openai.base-url=https://api.moonshot.ai/v1
spring.ai.openai.api-key=test-key
spring.ai.openai.chat.options.model=test-model

# Disable security for tests
supabase.jwt.secret=test-secret-key-for-unit-testing-only

# Encryption key for tests (exactly 32 bytes for AES-256)
token.encryption.key=TestKey32BytesExactlyForAES256!!

# Google OAuth (disabled for tests)
google.oauth.client-id=test-client-id
google.oauth.client-secret=test-client-secret

# Microsoft OAuth (disabled for tests)
microsoft.oauth.client-id=test-ms-client-id
microsoft.oauth.client-secret=test-ms-client-secret
microsoft.oauth.tenant-id=test-tenant-id
