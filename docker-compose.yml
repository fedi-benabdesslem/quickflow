version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
    ports:
      - "8080:8080"
    volumes:
      - backend-db:/app/data

  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  backend-db:
