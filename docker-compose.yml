version: "3.9"

services:
  postgres_test:
    image: postgres:16-alpine
    container_name: llm_backend_postgres_test
    environment:
      - POSTGRES_DB=llm_test
      - POSTGRES_USER=llm_user
      - POSTGRES_PASSWORD=llm_pass
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata_test:/var/lib/postgresql/data

  mock_llm:
    build:
      context: ./mock-llm
      dockerfile: Dockerfile
    container_name: llm_backend_mock_llm
    ports:
      - "8081:8081"
    environment:
      - FLASK_ENV=production

volumes:
  pgdata_test:
    driver: local


