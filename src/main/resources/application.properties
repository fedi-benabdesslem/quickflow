spring.application.name=LlmProjectBackend
spring.security.user.name=user
spring.security.user.password=1234

# Single-profile config: use Docker Postgres and mock LLM by default
spring.datasource.url=jdbc:postgresql://localhost:5433/llm_test
spring.datasource.username=llm_user
spring.datasource.password=llm_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

llm.service.url=http://localhost:8081/api/llm

